name: Feature request
description: Suggest an improvement to the Breeze app
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: markdown
    attributes:
      value: "If this needs a new server endpoint, please also open an issue on [breeze-core](https://github.com/monikapurpl3/breeze-core/issues)."
